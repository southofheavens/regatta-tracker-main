services:
  nginx:
    image: nginx:alpine
    container_name: regatta_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      auth:
        condition: service_started
      receiver:
        condition: service_started
      management:
        condition: service_healthy
      observer:
        condition: service_started
      race-postprocessor:
        condition: service_started
    restart: unless-stopped
    networks:
      - default

  minio:
    image: minio/minio:latest

    container_name: minio

    command: server /data --console-address ":${MINIO_CONSOLE_PORT}"
    
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
   
    ports:
      - "9000:9000"
      - "9001:9001"

    volumes:
      - minio_data:/data 
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 40s

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    hostname: rabbitmq
    container_name: rabbitmq

    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_VHOST: /
      RABBITMQ_NODENAME: rabbit@rabbitmq

    ports:
      - "5672:5672"    
      - "15672:15672" 

    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    container_name: regatta_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  
  redis:
    image: redis:7-alpine 
    ports:
      - "6379:6379"
    container_name: regatta_redis

    volumes:
      - redis_data:/data 
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro  

    command: redis-server --appendonly yes  

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  auth:
    build:
      context: ../regatta-tracker-auth
      dockerfile: Dockerfile
    container_name: regatta_auth
    environment:
      PSQL_HOST: postgres
      PSQL_USER: ${POSTGRES_USER}
      PSQL_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      SECRET_KEY: ${SECRET_KEY}
    # volumes:
    #   - auth_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:8080/health"] 
    #   interval: 15s
    #   timeout: 5s
    #   retries: 3
    #   start_period: 20s

  receiver:
    build:
      context: ../regatta-tracker-receiver
      dockerfile: Dockerfile
    container_name: regatta_receiver
    environment:
      REDIS_HOST: redis
      SECRET_KEY: ${SECRET_KEY}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  management:
    build:
      context: ../regatta-tracker-management
      dockerfile: Dockerfile
    container_name: regatta_management
    environment:
      PSQL_HOST: postgres
      PSQL_USER: ${POSTGRES_USER}
      PSQL_PASSWORD: ${POSTGRES_PASSWORD}
      MINIO_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_ENDPOINT_OVERRIDE: "minio:9000"
      MINIO_SCHEME: ${MINIO_SCHEME:-http}
      REDIS_HOST: redis
      SECRET_KEY: ${SECRET_KEY}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "8082"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  race-postprocessor:
    build:
      context: ../regatta-tracker-race-postprocessor
      dockerfile: Dockerfile
    container_name: regatta_race_postprocessor
    environment:
      PSQL_HOST: postgres
      PSQL_USER: ${POSTGRES_USER}
      PSQL_PASSWORD: ${POSTGRES_PASSWORD}
      MINIO_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_ENDPOINT_OVERRIDE: "minio:9000"
      MINIO_SCHEME: ${MINIO_SCHEME:-http}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SECRET_KEY: ${SECRET_KEY}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: 5672
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  create-analytics-minio-buckets:
    image: minio/mc:latest
    container_name: create_analytics_minio_buckets
    restart: no
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MC_ENDPOINT: ${ANALYTICS_MC_ENDPOINT:-http://minio:9000}
      MC_ROOT_USER: ${MINIO_ROOT_USER}
      MC_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -e
        mc alias set regatta $$MC_ENDPOINT $$MC_ROOT_USER $$MC_ROOT_PASSWORD
        mc mb --ignore-existing regatta/gpx-files
        mc mb --ignore-existing regatta/pdf-reports
        mc mb --ignore-existing regatta/csv-reports
        echo analytics minio buckets ok

  analytics:
    image: stdneprov/analytics:latest
    container_name: regatta_analytics
    depends_on:
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      create-analytics-minio-buckets:
        condition: service_completed_successfully
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_REGION: ${ANALYTICS_AWS_REGION:-eu-central-1}
      AWS_ENDPOINT_URL: ${ANALYTICS_AWS_ENDPOINT_URL:-http://minio:9000}
      RABBITMQ_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      TASKS_QUEUE: analytics_tasks
      NOTIFICATIONS_QUEUE: notifier_tasks
      NOTIFICATIONS_EXCHANGE: ""
    restart: unless-stopped

  observer:
    build:
      context: ../regatta-tracker-observer
      dockerfile: Dockerfile
    container_name: regatta_observer
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SECRET_KEY: ${SECRET_KEY}
      PSQL_HOST: postgres
      PSQL_USER: ${POSTGRES_USER}
      PSQL_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  integration-tests:
    build:
      context: .
      dockerfile: tests/Dockerfile.integration
    container_name: regatta_integration_tests
    restart: no
    network_mode: service:nginx
    env_file:
      - .env
    environment:
      PSQL_HOST: postgres
      PSQL_PORT: '5432'
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      MINIO_ENDPOINT_OVERRIDE: minio:9000
      MINIO_SCHEME: ${MINIO_SCHEME:-http}
    volumes:
      - ./.env:/workspace/tests/.env:ro
    depends_on:
      nginx:
        condition: service_started

volumes:
  minio_data: 
  postgres_data:
  redis_data:
  rabbitmq_data:
