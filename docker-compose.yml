services:
  nginx:
    image: nginx:alpine
    container_name: regatta_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      auth:
        condition: service_started
      receiver:
        condition: service_started
      management:
        condition: service_healthy
      observer:
        condition: service_started
      race-postprocessor:
        condition: service_started
    restart: unless-stopped
    networks:
      - default

  minio:
    image: minio/minio:latest

    container_name: minio

    command: server /data --console-address ":${MINIO_CONSOLE_PORT}"
    
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
   
    ports:
      - "9000:9000"
      - "9001:9001"

    volumes:
      - minio_data:/data 
      - ~/.minio/certs:/root/.minio/certs:ro
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "curl", "-k", "-f", "https://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 40s

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    hostname: rabbitmq
    container_name: rabbitmq

    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_VHOST: /
      RABBITMQ_NODENAME: rabbit@rabbitmq

    ports:
      - "5672:5672"    
      - "15672:15672" 

    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    container_name: regatta_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  
  redis:
    image: redis:7-alpine 
    ports:
      - "6379:6379"
    container_name: regatta_redis

    volumes:
      - redis_data:/data 
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro  

    command: redis-server --appendonly yes  

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  auth:
    build:
      context: ../regatta-tracker-auth
      dockerfile: Dockerfile
    container_name: regatta_auth
    environment:
      PSQL_HOST: postgres
      PSQL_USER: ${POSTGRES_USER}
      PSQL_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      SECRET_KEY: ${SECRET_KEY}
    # volumes:
    #   - auth_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:8080/health"] 
    #   interval: 15s
    #   timeout: 5s
    #   retries: 3
    #   start_period: 20s

  receiver:
    build:
      context: ../regatta-tracker-receiver
      dockerfile: Dockerfile
    container_name: regatta_receiver
    environment:
      REDIS_HOST: redis
      SECRET_KEY: ${SECRET_KEY}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  management:
    build:
      context: ../regatta-tracker-management
      dockerfile: Dockerfile
    container_name: regatta_management
    environment:
      PSQL_HOST: postgres
      PSQL_USER: ${POSTGRES_USER}
      PSQL_PASSWORD: ${POSTGRES_PASSWORD}
      MINIO_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_ENDPOINT_OVERRIDE: "minio:9000"
      REDIS_HOST: redis
      SECRET_KEY: ${SECRET_KEY}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      # С хоста: Postman на localhost:8082. Без этого порта доступен только через nginx :80
      - "8082:8082"
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "8082"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  race-postprocessor:
    build:
      context: ../regatta-tracker-race-postprocessor
      dockerfile: Dockerfile
    container_name: regatta_race_postprocessor
    environment:
      PSQL_HOST: postgres
      PSQL_USER: ${POSTGRES_USER}
      PSQL_PASSWORD: ${POSTGRES_PASSWORD}
      MINIO_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_ENDPOINT_OVERRIDE: "minio:9000"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SECRET_KEY: ${SECRET_KEY}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: 5672
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  observer:
    build:
      context: ../regatta-tracker-observer
      dockerfile: Dockerfile
    container_name: regatta_observer
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SECRET_KEY: ${SECRET_KEY}
      PSQL_HOST: postgres
      PSQL_USER: ${POSTGRES_USER}
      PSQL_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  minio_data: 
  postgres_data:
  redis_data:
  rabbitmq_data:
