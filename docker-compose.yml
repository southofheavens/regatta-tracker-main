services:
  minio:
    image: minio/minio:latest

    container_name: minio

    command: server /data --console-address ":${MINIO_CONSOLE_PORT}"
    
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    
    volumes:
      - minio_data:/data 
      - ~/.minio/certs:/root/.minio/certs:ro
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "curl", "-k", "-f", "https://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:15-alpine

    container_name: regatta_postgres

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d regatta_tracker_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  
  redis:
    image: redis:7-alpine 

    container_name: regatta_redis

    ports:
      - "${REDIS_PORT}:6379"

    volumes:
      - redis_data:/data 
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro  

    command: redis-server --appendonly yes  

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  auth:
    build:
      context: ../regatta-tracker-auth
      dockerfile: Dockerfile
    container_name: regatta_auth
    ports:
      - "${AUTH_PORT}:8080"
    environment:
      PSQL_HOST: postgres
      PSQL_USER: ${POSTGRES_USER}
      PSQL_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
    # volumes:
    #   - auth_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:8080/health"] 
    #   interval: 15s
    #   timeout: 5s
    #   retries: 3
    #   start_period: 20s

  receiver:
    build:
      context: ../regatta-tracker-receiver
      dockerfile: Dockerfile
    container_name: regatta_receiver
    environment:
      REDIS_HOST: redis
    ports:
      - "${RECEIVER_PORT}:8081"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  management:
    build:
      context: ../regatta-tracker-management
      dockerfile: Dockerfile
    container_name: regatta_management
    environment:
      PSQL_HOST: postgres
      PSQL_USER: ${POSTGRES_USER}
      PSQL_PASSWORD: ${POSTGRES_PASSWORD}
      MINIO_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_ENDPOINT_OVERRIDE: "minio:9000"
      REDIS_HOST: redis
    ports:
      - "${MANAGEMENT_PORT}:8082"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

volumes:
  minio_data: 
  postgres_data:
  redis_data:
