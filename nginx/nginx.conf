events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
    
    sendfile on;
    keepalive_timeout 65;

    resolver 127.0.0.11 valid=10s ipv6=off;
    
    upstream auth_service {
        zone auth_upstream 64k;
        server auth:8080 resolve max_fails=3 fail_timeout=10s;
    }
    
    upstream receiver_service {
        server receiver:8081;
    }
    
    upstream management_service {
        server management:8082;
    }

    upstream race_postprocessor_service {
        server race-postprocessor:8083;
    }

    upstream observer_service {
        server observer:8084;
    }

    server {
        listen 80;
        server_name _;
        
        location /auth/ {
            proxy_pass http://auth_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        location /receiver/ {
            proxy_pass http://receiver_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        
        location /management/ {
            proxy_pass http://management_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        
        location /race-postprocessor/ {
            proxy_pass http://race_postprocessor_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /observer/ {
            proxy_pass http://observer_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /health {
            access_log off;
            return 200 "nginx OK\n";
            add_header Content-Type text/plain;
        }
        
        location / {
            return 404 "Not Found\n";
            add_header Content-Type text/plain;
        }
    }
}
